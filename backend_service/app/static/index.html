<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Investigation Evidence Analyzer</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Inter, system-ui, Arial, sans-serif;
            margin: 0;
            background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 30%, #f8fafc 100%);
            color: #111827;
            min-height: 100vh;
        }

        .container {
            max-width: 820px;
            margin: 32px auto;
            padding: 0 16px;
        }

        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, .06);
            margin-bottom: 16px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 28px;
        }

        .subtitle {
            color: #4b5563;
            margin: 0 0 14px;
            font-size: 14px;
        }

        .upload-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type=file] {
            flex: 1;
            min-width: 240px;
            border: 1.5px dashed #94a3b8;
            border-radius: 10px;
            padding: 9px 10px;
            background: #f8fafc;
            font-size: 13px;
        }

        button {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        button:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        #mindmapBtn {
            background: #059669;
            display: none;
        }

        #retryBtn {
            background: #64748b;
            display: none;
        }

        .status-bar {
            margin-top: 14px;
        }

        .status-label {
            font-size: 13px;
            color: #475569;
            margin-bottom: 6px;
        }

        .progress-track {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #6366f1);
            border-radius: 99px;
            transition: width .5s ease;
        }

        .muted {
            color: #94a3b8;
            font-size: 11px;
            margin-top: 6px;
        }

        /* ── Step list ── */
        .steps {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .steps li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            border: 1.5px solid #e2e8f0;
            background: #f8fafc;
            transition: background .25s, border-color .25s;
        }

        .steps li.done {
            background: #f0fdf4;
            border-color: #bbf7d0;
        }

        .steps li.active {
            background: #eff6ff;
            border-color: #bfdbfe;
        }

        .steps li.failed {
            background: #fff1f2;
            border-color: #fecdd3;
        }

        .step-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* pending: gray dot */
        .icon-pending {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #cbd5e1;
        }

        /* active: CSS spinner */
        .icon-spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid #bfdbfe;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* done: green checkmark SVG */
        .icon-check svg {
            display: block;
        }

        /* failed: red X */
        .icon-x svg {
            display: block;
        }

        .step-label {
            font-size: 14px;
            color: #374151;
            flex: 1;
        }

        .steps li.done .step-label {
            color: #166534;
            font-weight: 500;
        }

        .steps li.active .step-label {
            color: #1d4ed8;
            font-weight: 600;
        }

        .steps li.failed .step-label {
            color: #be123c;
        }

        .step-badge {
            font-size: 11px;
            font-weight: 600;
            border-radius: 99px;
            padding: 2px 8px;
            letter-spacing: .03em;
        }

        .done .step-badge {
            background: #dcfce7;
            color: #166534;
        }

        .active .step-badge {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .failed .step-badge {
            background: #ffe4e6;
            color: #be123c;
        }

        .pending .step-badge {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="card">
            <h1>Investigation Evidence Analyzer</h1>
            <p class="subtitle">Upload evidence files and wait for the system to build your final interactive mindmap.
            </p>

            <div class="upload-row">
                <input id="files" type="file" accept=".txt" multiple />
                <button id="submitBtn">Build Evidence Mindmap</button>
                <button id="retryBtn">Start New Job</button>
                <button id="mindmapBtn">&#10003; Open Final Mindmap</button>
            </div>

            <div class="status-bar">
                <div class="status-label" id="statusLine">Ready to analyze evidence.</div>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="muted" id="jobInfo"></div>
        </div>

        <div class="card">
            <h2 style="margin:0 0 12px;font-size:17px;">Progress</h2>
            <ul class="steps" id="stepsList">
                <li data-step="validate_input" class="pending">
                    <span class="step-icon"><span class="icon-pending"></span></span>
                    <span class="step-label">Checking uploaded evidence</span>
                    <span class="step-badge"></span>
                </li>
                <li data-step="extract_events" class="pending">
                    <span class="step-icon"><span class="icon-pending"></span></span>
                    <span class="step-label">Extracting events</span>
                    <span class="step-badge"></span>
                </li>

                <li data-step="lloom_scoring" class="pending">
                    <span class="step-icon"><span class="icon-pending"></span></span>
                    <span class="step-label">Discovering themes (clustering events)</span>
                    <span class="step-badge"></span>
                </li>

                <li data-step="build_mindmap" class="pending">
                    <span class="step-icon"><span class="icon-pending"></span></span>
                    <span class="step-label">Building final interactive mindmap</span>
                    <span class="step-badge"></span>
                </li>
            </ul>
        </div>

    </div>

    <script>
        const CHECK_SVG = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <circle cx="8" cy="8" r="8" fill="#22c55e"/>
    <path d="M4.5 8.5l2.5 2.5 4.5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;

        const X_SVG = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <circle cx="8" cy="8" r="8" fill="#f43f5e"/>
    <path d="M5.5 5.5l5 5M10.5 5.5l-5 5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  </svg>`;

        let activeJobId = null, pollTimer = null;

        const filesInput = document.getElementById('files');
        const submitBtn = document.getElementById('submitBtn');
        const retryBtn = document.getElementById('retryBtn');
        const mindmapBtn = document.getElementById('mindmapBtn');
        const jobInfo = document.getElementById('jobInfo');
        const progressFill = document.getElementById('progressFill');
        const statusLine = document.getElementById('statusLine');
        const stepsList = document.getElementById('stepsList');

        function setStepState(li, state, badge) {
            li.className = state;               // pending | active | done | failed
            const iconWrap = li.querySelector('.step-icon');
            const badgeEl = li.querySelector('.step-badge');
            if (state === 'done') {
                iconWrap.innerHTML = `<span class="icon-check">${CHECK_SVG}</span>`;
                badgeEl.textContent = 'Done';
            } else if (state === 'active') {
                iconWrap.innerHTML = '<span class="icon-spinner"></span>';
                badgeEl.textContent = 'In progress';
            } else if (state === 'failed') {
                iconWrap.innerHTML = `<span class="icon-x">${X_SVG}</span>`;
                badgeEl.textContent = 'Failed';
            } else {
                iconWrap.innerHTML = '<span class="icon-pending"></span>';
                badgeEl.textContent = '';
            }
        }

        function resetSteps() {
            for (const li of stepsList.querySelectorAll('li')) {
                setStepState(li, 'pending');
            }
        }

        // Drive UI entirely from the job.steps[] array returned by the API
        function applyStepsFromApi(steps, jobStatus) {
            if (!steps || steps.length === 0) return;
            for (const step of steps) {
                const li = stepsList.querySelector(`li[data-step="${step.key}"]`);
                if (!li) continue;
                if (step.status === 'completed') {
                    setStepState(li, 'done');
                } else if (step.status === 'running') {
                    setStepState(li, 'active');
                } else if (step.status === 'failed') {
                    setStepState(li, 'failed');
                } else {
                    setStepState(li, 'pending');
                }
            }
            // If whole job completed, force all steps green
            if (jobStatus === 'completed') {
                for (const li of stepsList.querySelectorAll('li')) {
                    setStepState(li, 'done');
                }
            }
        }

        async function startJob() {
            const files = filesInput.files;
            if (!files || files.length === 0) { alert('Please choose at least one .txt file.'); return; }
            const form = new FormData();
            for (const f of files) form.append('files', f);
            submitBtn.disabled = true;
            retryBtn.style.display = 'none';
            mindmapBtn.style.display = 'none';
            resetSteps();
            progressFill.style.width = '0%';
            try {
                const res = await fetch('/jobs', { method: 'POST', body: form });
                if (!res.ok) throw new Error((await res.text()) || 'Failed to create job');
                const data = await res.json();
                activeJobId = data.job_id;
                jobInfo.textContent = `Reference ID: ${activeJobId}`;
                await refreshStatus();
                startPolling();
            } catch (err) {
                alert(`Error: ${err.message}`);
                retryBtn.style.display = 'inline-block';
            } finally {
                submitBtn.disabled = false;
            }
        }

        async function refreshStatus() {
            if (!activeJobId) return;
            let job;
            try {
                const res = await fetch(`/jobs/${activeJobId}`);
                if (!res.ok) return;
                job = await res.json();
            } catch { return; }

            progressFill.style.width = `${job.progress_percent || 0}%`;
            statusLine.textContent = `Status: ${job.status}`;

            applyStepsFromApi(job.steps, job.status);

            if (job.status === 'completed') {
                progressFill.style.width = '100%';
                mindmapBtn.style.display = 'inline-block';
                retryBtn.style.display = 'inline-block';
                stopPolling();
            } else if (job.status === 'failed' || job.status === 'cancelled') {
                retryBtn.style.display = 'inline-block';
                stopPolling();
            }
        }

        function startPolling() { stopPolling(); pollTimer = setInterval(refreshStatus, 2500); }
        function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

        function openMindmap() { if (activeJobId) window.open(`/jobs/${activeJobId}/mindmap`, '_blank'); }

        function startNewJob() {
            activeJobId = null;
            filesInput.value = '';
            progressFill.style.width = '0%';
            jobInfo.textContent = '';
            statusLine.textContent = 'Ready to analyze evidence.';
            mindmapBtn.style.display = 'none';
            retryBtn.style.display = 'none';
            resetSteps();
        }

        submitBtn.addEventListener('click', startJob);
        mindmapBtn.addEventListener('click', openMindmap);
        retryBtn.addEventListener('click', startNewJob);
    </script>
</body>

</html>
